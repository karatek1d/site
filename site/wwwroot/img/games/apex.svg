<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Apex Legends A-diamond emblem -->
  <rect width="100" height="100" rx="18" fill="#111"/>
  <!-- Diamond outer frame -->
  <polygon points="50,6 94,50 50,94 6,50" fill="none" stroke="#cd3333" stroke-width="5"/>
  <!-- A shape made of angular lines -->
  <!-- Left leg of A -->
  <line x1="50" y1="14" x2="22" y2="78" stroke="#cd3333" stroke-width="7" stroke-linecap="round"/>
  <!-- Right leg of A -->
  <line x1="50" y1="14" x2="78" y2="78" stroke="#cd3333" stroke-width="7" stroke-linecap="round"/>
  <!-- Crossbar of A -->
  <line x1="31" y1="56" x2="69" y2="56" stroke="#cd3333" stroke-width="7" stroke-linecap="round"/>
  <!-- Bottom gap in diamond frame (like the real logo) -->
  <line x1="35" y1="80" x2="65" y2="80" stroke="#111" stroke-width="8"/>
</svg>
